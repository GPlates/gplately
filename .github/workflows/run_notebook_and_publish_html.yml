name: Run notebook and publish HTML

on:
  workflow_dispatch:
    inputs:
      notebook_14:
        description: "14-RuleBasedGPMLProcessingPipeline"
        type: boolean
        default: true
      notebook_15:
        description: "15-ConvertGridReferenceFrame"
        type: boolean
        default: true
      notebook_plot_map_with_pygmt:
        description: "Examples/plot_map_with_pygmt"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  execute-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "1.5.8-0"
          environment-file: conda/doc-env.yml
          init-shell: bash
          cache-environment: true
          post-cleanup: all

      - name: Install current gplately
        run: |
          pip install . --no-binary :all: --no-cache-dir --no-dependencies

      - name: Execute notebooks
        run: |
          notebooks=()
          ${{ inputs.notebook_14 }} && notebooks+=(14-RuleBasedGPMLProcessingPipeline)
          ${{ inputs.notebook_15 }} && notebooks+=(15-ConvertGridReferenceFrame)
          ${{ inputs.notebook_plot_map_with_pygmt }} && notebooks+=(Examples/plot_map_with_pygmt)

          if [ ${#notebooks[@]} -eq 0 ]; then
            echo "No notebooks selected. Skipping execution."
            exit 0
          fi

          for notebook in "${notebooks[@]}"; do
            mkdir -p "/tmp/notebook-run/${notebook}"
            jupyter nbconvert \
              --to notebook \
              --execute \
              --output executed-notebook.ipynb \
              --output-dir "/tmp/notebook-run/${notebook}" \
              "Notebooks/${notebook}.ipynb"

            mkdir -p "notebook-html/$(dirname "${notebook}")"
            jupyter nbconvert \
              --to html \
              --output "${notebook}.html" \
              --output-dir notebook-html \
              "/tmp/notebook-run/${notebook}/executed-notebook.ipynb"
          done

      - name: Deploy HTML to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4.2.2
        with:
          branch: gh-pages
          folder: notebook-html
          target-folder: sphinx-latest/notebook-html
          clean: false
