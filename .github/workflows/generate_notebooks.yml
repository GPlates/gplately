name: Generate Notebooks

on:
  push:
    paths:
      - Notebooks/14-RuleBasedGPMLProcessingPipeline.py
      - Notebooks/Examples/plot_map_with_pygmt.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-notebook:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jupytext
        run: python -m pip install --upgrade pip jupytext

      - name: Generate notebooks
        run: |
          jupytext --to notebook \
            Notebooks/14-RuleBasedGPMLProcessingPipeline.py \
            -o Notebooks/14-RuleBasedGPMLProcessingPipeline.ipynb
          jupytext --to notebook \
            Notebooks/Examples/plot_map_with_pygmt.py \
            -o Notebooks/Examples/plot_map_with_pygmt.ipynb

      - name: Commit updated notebooks
        run: |
          changed=()
          git diff --quiet -- Notebooks/14-RuleBasedGPMLProcessingPipeline.ipynb || changed+=(Notebooks/14-RuleBasedGPMLProcessingPipeline.ipynb)
          git diff --quiet -- Notebooks/Examples/plot_map_with_pygmt.ipynb || changed+=(Notebooks/Examples/plot_map_with_pygmt.ipynb)

          if [ ${#changed[@]} -eq 0 ]; then
            echo "No notebook changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${changed[@]}"
          git commit -m "ci: regenerate notebooks"
          git push
